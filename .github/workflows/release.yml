name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y libgtk-4-dev
      - run: cargo build --release
      - run: mv target/release/Polora target/release/Polora-linux
      - uses: actions/upload-artifact@v4
        with:
          name: polora-linux
          path: target/release/Polora-linux

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install gtk4
      - run: cargo build --release --no-default-features
      - run: mv target/release/Polora target/release/Polora-mac
      - uses: actions/upload-artifact@v4
        with:
          name: polora-mac
          path: target/release/Polora-mac

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-pkgconf
      - shell: msys2 {0}
        run: cargo build --release --no-default-features
      - uses: actions/upload-artifact@v4
        with:
          name: polora-windows
          path: target/release/Polora.exe

  publish:
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/polora-linux/Polora-linux
            artifacts/polora-mac/Polora-mac
            artifacts/polora-windows/Polora.exe